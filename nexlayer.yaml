application:
  name: infinite-orbit
  pods:
    - name: infinite-orbit-app
      image: infinite-orbit:latest
      path: /
      servicePorts:
        - 3000
      vars:
        OLLAMA_BASE_URL: "http://ollama-gpu.pod:11434"
        OLLAMA_MODEL: "qwen2:0.5b"
        NODE_ENV: "production"

    - name: ollama-gpu
      image: ollama/ollama:latest
      servicePorts:
        - 11434
      useGPU: true
